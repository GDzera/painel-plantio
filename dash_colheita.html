<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CCT Ipaussu — Colheita Safra 25/26 | Raízen</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
<style>
:root{--rz:#00843D;--rzl:#00A84E;--rzd:#006830;--rzg:rgba(0,132,61,.12);--rzg2:rgba(0,132,61,.06);
--bg:#f5f7f6;--s1:#fff;--s2:#f0f4f2;--bd:#e0e8e3;--tx:#1a2e22;--tx2:#5a7265;
--red:#d63031;--redd:rgba(214,48,49,.1);--am:#e17055;--amd:rgba(225,112,85,.1);
--bl:#0984e3;--cy:#00b894;--pr:#6c5ce7;
--sh:0 1px 3px rgba(0,40,20,.06),0 1px 2px rgba(0,40,20,.04);--sh2:0 4px 12px rgba(0,40,20,.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.app{max-width:1480px;margin:0 auto;padding:16px 20px}
.hdr{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;background:var(--rz);border-radius:14px;margin-bottom:16px;box-shadow:var(--sh2)}
.hdr-left{display:flex;align-items:center;gap:14px}
.hdr-logo{width:36px;height:36px;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--rz);font-size:14px}
.hdr h1{font-size:18px;font-weight:700;color:#fff}.hdr h1 span{opacity:.7;font-weight:500}
.hdr-r{display:flex;gap:10px}.badge{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;background:rgba(255,255,255,.2);color:#fff}
.tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--s1);padding:4px;border-radius:12px;box-shadow:var(--sh);width:fit-content}
.tab{padding:10px 24px;border-radius:10px;border:none;background:transparent;color:var(--tx2);cursor:pointer;font-size:13px;font-weight:600;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s}
.tab:hover{background:var(--rzg);color:var(--rz)}.tab.on{background:var(--rz);color:#fff;box-shadow:0 2px 8px rgba(0,132,61,.3)}
.filters{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.fb{padding:6px 14px;border:1.5px solid var(--bd);border-radius:8px;background:var(--s1);color:var(--tx2);cursor:pointer;font-size:12px;font-weight:600;font-family:'Plus Jakarta Sans',sans-serif}
.fb:hover{border-color:var(--rz);color:var(--rz)}.fb.on{background:var(--rz);border-color:var(--rz);color:#fff}
.kg{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:12px;margin-bottom:16px}
.k{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:16px 18px;position:relative;overflow:hidden;box-shadow:var(--sh)}
.k::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;border-radius:4px 0 0 4px}
.k.cg{before:background:var(--rz)}.k.cb::before{background:var(--bl)}.k.ca::before{background:var(--am)}.k.cc::before{background:var(--cy)}.k.cp::before{background:var(--pr)}.k.cr::before{background:var(--red)}
.kl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--tx2);margin-bottom:6px}
.kv{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700}.ks{font-size:10px;color:var(--tx2);margin-top:3px;font-family:'JetBrains Mono',monospace}
.kp{display:inline-block;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-top:6px}
.pu{background:var(--rzg);color:var(--rz)}.pd{background:var(--redd);color:var(--red)}
.cg2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.cc{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:18px;box-shadow:var(--sh)}.cc.full{grid-column:1/-1}
.ct{font-size:13px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}.ct .dot{width:8px;height:8px;border-radius:50%}
.cw{position:relative;height:260px}.cw.tall{height:320px}
.tc{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:18px;margin-bottom:16px;overflow-x:auto;box-shadow:var(--sh)}
.tc table{width:100%;border-collapse:collapse;font-size:11px}
.tc th{text-align:center;padding:10px;color:var(--tx2);font-weight:700;text-transform:uppercase;font-size:9px;border-bottom:2px solid var(--bd);white-space:nowrap}
.tc td{padding:8px 10px;border-bottom:1px solid var(--s2);font-family:'JetBrains Mono',monospace;font-size:11px;white-space:nowrap;text-align:center}
.tc tr:hover td{background:var(--rzg2)}.vp{color:var(--rz);font-weight:600}.vn{color:var(--red);font-weight:600}.vw{color:var(--am);font-weight:600}
.frente-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.fc{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:16px;position:relative;overflow:hidden;box-shadow:var(--sh)}
.fc::before{content:'';position:absolute;top:0;left:0;width:100%;height:3px}
.fc-name{font-size:13px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:6px}.fc-name .dot{width:10px;height:10px;border-radius:50%}
.fc-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--s2);font-size:11px}.fc-row:last-child{border-bottom:none}
.fc-row .label{color:var(--tx2)}.fc-row .val{font-family:'JetBrains Mono',monospace;font-weight:600}
.gap-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:16px}
.gap-card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:18px;box-shadow:var(--sh)}.gap-card h3{font-size:13px;font-weight:800;margin-bottom:14px}
.gap-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}.gap-label{width:40px;font-size:11px;font-weight:700;color:var(--tx2);text-align:right}
.gap-bar-wrap{flex:1;height:30px;background:var(--s2);border-radius:8px;overflow:hidden}
.gap-bar{height:100%;border-radius:8px;display:flex;align-items:center;justify-content:flex-end;padding-right:10px;font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;color:#fff;min-width:45px}
.gap-val{width:70px;font-size:11px;font-family:'JetBrains Mono',monospace;font-weight:600;text-align:right}
.gap-diff{font-size:10px;font-family:'JetBrains Mono',monospace}.gap-diff.pos{color:var(--rz)}.gap-diff.neg{color:var(--red)}
.section-title{font-size:16px;font-weight:800;margin:22px 0 14px;display:flex;align-items:center;gap:8px}.section-title .bar{width:4px;height:22px;border-radius:2px;background:var(--rz)}
.ins{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}.ic{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:18px;box-shadow:var(--sh)}
.ic h3{font-size:13px;font-weight:700;margin-bottom:10px;color:var(--rz)}
.ii{padding:7px 0;border-bottom:1px solid var(--s2);font-size:11px;line-height:1.6;color:var(--tx2)}.ii:last-child{border-bottom:none}.ii strong{color:var(--tx)}
.hidden{display:none}
@media(max-width:1100px){.frente-grid{grid-template-columns:repeat(2,1fr)}.gap-grid{grid-template-columns:1fr}}
@media(max-width:900px){.cg2,.ins{grid-template-columns:1fr}.kg{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.kg,.frente-grid{grid-template-columns:1fr}.hdr{flex-direction:column;gap:10px;text-align:center}.tabs{width:100%}.tab{flex:1;text-align:center}}
</style></head><body>
<div class="app">
<div class="hdr"><div class="hdr-left"><div class="hdr-logo">R</div><h1>CCT Ipaussu <span>— Colheita Safra 25/26</span></h1></div>
<div class="hdr-r"><span class="badge" id="spct"></span><span class="badge" id="sdt"></span></div></div>
<div class="tabs"><button class="tab on" onclick="switchTab(0)">Visão Mensal</button><button class="tab" onclick="switchTab(1)">Visão por Frente</button></div>
<div class="filters" id="flt"></div>
<div id="tab0"></div><div id="tab1" class="hidden"></div>
</div>
<script>
const D={"d":[{"mes":"Abr","dia":"2026-04-06","mt":1089.42,"mp":1089.42,"mix_p":100.0,"r351":380.88,"a351":83.08,"k351":16.8,"d351":27.21,"r352":297.24,"a352":55.98,"k352":56.2,"d352":29.72,"r353":411.3,"a353":117.29,"k353":39.4,"d353":30.26}],"m":{"meta_ipa":{"Abr":106715.0,"Mai":336499.0,"Jun":305938.0,"Jul":384639.0,"Ago":402899.0,"Set":287678.0,"Out":265119.0,"Nov":66467.0,"Dez":null,"Total":2155954.0},"real_u":{"Abr":1089.42,"Mai":0.0,"Jun":0.0,"Jul":0.0,"Ago":0.0,"Set":0.0,"Out":0.0,"Nov":0.0,"Dez":0.0,"Total":1089.42},"meta_p":{"Abr":68927.0,"Mai":198528.0,"Jun":180497.0,"Jul":226929.0,"Ago":237702.0,"Set":169724.0,"Out":156415.0,"Nov":36217.0,"Dez":0.0,"Total":1274939.0},"real_p":{"Abr":1089.42,"Mai":0.0,"Jun":0.0,"Jul":0.0,"Ago":0.0,"Set":0.0,"Out":0.0,"Nov":0.0,"Dez":0.0,"Total":1089.42}}};
const MO=['Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const FR=["351", "352", "353"];
const FC={'351':"#00843D",'352':"#e17055",'353':"#0984e3"};
const FCD={'351':"rgba(0,132,61,.15)",'352':"rgba(225,112,85,.15)",'353':"rgba(9,132,227,.15)"};
let selM = ['Todos'],activeTab=0,ch={};

function fmt(n,d){d=d||0;if(n==null||isNaN(n))return'\u2014';return n.toLocaleString('pt-BR',{minimumFractionDigits:d,maximumFractionDigits:d})}

function toggleMonth(m){
    if(m === 'Todos'){
        selM = ['Todos'];
    } else {
        if(selM.includes('Todos')) selM = [];
        if(selM.includes(m)){
            selM = selM.filter(x => x !== m);
            if(selM.length === 0) selM = ['Todos'];
        } else {
            selM.push(m);
        }
    }
    render();
}

function fD(){
    var dd=D.d.filter(function(d){return d.mt!=null});
    if(selM.includes('Todos')) return dd;
    return dd.filter(function(d){return selM.includes(d.mes)});
}

function switchTab(t){activeTab=t;document.querySelectorAll('.tab').forEach(function(b,i){b.classList.toggle('on',i===t)});
document.getElementById('tab0').classList.toggle('hidden',t!==0);document.getElementById('tab1').classList.toggle('hidden',t!==1);render()}

function rF(){
    document.getElementById('flt').innerHTML=['Todos'].concat(MO).map(function(m){
        var active = selM.includes(m) ? 'on' : '';
        return '<button class="fb '+active+'" onclick="toggleMonth(\''+m+'\')">'+m+'</button>'
    }).join('')
}

function renderTab0(){var dd=fD(),el=document.getElementById('tab0');
var tM=0,tP=0;dd.forEach(function(d){tM+=d.mt||0;tP+=d.mp||0});
var f1=FR[0];var fa=dd.filter(function(d){return d['a'+f1]});var fi=dd.filter(function(d){return d['i'+f1]});
var fr2=dd.filter(function(d){return d['k'+f1]});var fd=dd.filter(function(d){return d['d'+f1]});
var aA=0,aI=0,aR=0,aD2=0;
if(fa.length)fa.forEach(function(d){aA+=d['a'+f1]/fa.length});
if(fi.length)fi.forEach(function(d){aI+=d['i'+f1]/fi.length});
if(fr2.length)fr2.forEach(function(d){aR+=d['k'+f1]/fr2.length});
if(fd.length)fd.forEach(function(d){aD2+=d['d'+f1]/fd.length});
var mx=tM>0?(tP/tM*100):0;

var mT=0, rT=0;
MO.forEach(function(m){
    if(selM.includes('Todos') || selM.includes(m)){
        mT += D.m.meta_ipa[m] || 0;
        rT += D.m.real_u[m] || 0;
    }
});
if(selM.includes('Todos')){ mT = D.m.meta_ipa.Total; rT = D.m.real_u.Total; }

var pM=mT>0?(rT/mT*100):0;
document.getElementById('spct').textContent='Safra: '+fmt(pM,1)+'%';
var ld=dd[dd.length-1];document.getElementById('sdt').textContent=ld?'\u00DAltimo: '+ld.dia:'';

var h='<div class="kg">';
h+='<div class="k cg"><div class="kl">Moagem Total</div><div class="kv">'+fmt(tM)+'</div><div class="ks">ton</div><div class="kp '+(pM>=100?'pu':'pd')+'">'+fmt(pM,1)+'% da meta</div></div>';
h+='<div class="k cb"><div class="kl">Moagem Pr\u00f3pria</div><div class="kv">'+fmt(tP)+'</div><div class="ks">Mix '+fmt(mx,1)+'%</div></div>';
h+='<div class="k cg"><div class="kl">ATR M\u00e9dio</div><div class="kv">'+fmt(aA,1)+'</div></div>';
h+='<div class="k ca"><div class="kl">Impureza</div><div class="kv">'+fmt(aI,1)+'%</div></div>';
h+='<div class="k cc"><div class="kl">Raio</div><div class="kv">'+fmt(aR,1)+' km</div></div>';
h+='<div class="k cp"><div class="kl">Dens Carga</div><div class="kv">'+fmt(aD2,1)+'</div></div></div>';

h+='<div class="cg2"><div class="cc full"><div class="ct"><div class="dot" style="background:var(--rz)"></div>Moagem Di\u00e1ria vs Plano</div><div class="cw tall"><canvas id="mc1"></canvas></div></div>';
h+='<div class="cc"><div class="ct"><div class="dot" style="background:var(--bl)"></div>Meta vs Realizado</div><div class="cw"><canvas id="mc2"></canvas></div></div>';
h+='<div class="cc"><div class="ct"><div class="dot" style="background:var(--cy)"></div>ATR M\u00e9dio</div><div class="cw"><canvas id="mc3"></canvas></div></div>';
h+='<div class="cc"><div class="ct"><div class="dot" style="background:var(--am)"></div>Impureza M\u00e9dia</div><div class="cw"><canvas id="mc4"></canvas></div></div>';
h+='<div class="cc"><div class="ct"><div class="dot" style="background:var(--pr)"></div>Mix e Raio</div><div class="cw"><canvas id="mc5"></canvas></div></div></div>';

h+='<div class="tc"><div class="ct"><div class="dot" style="background:var(--rz)"></div>Resumo Mensal</div><table><thead><tr><th style="text-align:left">M\u00eas</th><th>Meta IPA</th><th>Realizado</th><th>%</th><th>Meta Pr\u00f3p</th><th>Real Pr\u00f3p</th><th>%</th></tr></thead><tbody>';
MO.forEach(function(m){var mi=D.m.meta_ipa[m]||0,ri=D.m.real_u[m]||0,pi=mi>0?ri/mi*100:0;var mp2=D.m.meta_p[m]||0,rp=D.m.real_p[m]||0,pp=mp2>0?rp/mp2*100:0;
h+='<tr><td style="font-weight:700;text-align:left">'+m+'</td><td>'+fmt(mi)+'</td><td>'+fmt(ri)+'</td><td class="'+(pi>=100?'vp':'vn')+'">'+fmt(pi,1)+'%</td><td>'+fmt(mp2)+'</td><td>'+fmt(rp)+'</td><td class="'+(pp>=100?'vp':'vn')+'">'+fmt(pp,1)+'%</td></tr>'});
var ti=D.m.meta_ipa.Total||0,tri=D.m.real_u.Total||0,tp=D.m.meta_p.Total||0,trp=D.m.real_p.Total||0;
h+='<tr style="font-weight:700;border-top:2px solid var(--rz)"><td style="text-align:left">TOTAL</td><td>'+fmt(ti)+'</td><td>'+fmt(tri)+'</td><td class="'+(tri/ti>=1?'vp':'vn')+'">'+fmt(tri/ti*100,1)+'%</td><td>'+fmt(tp)+'</td><td>'+fmt(trp)+'</td><td class="'+(trp/tp>=1?'vp':'vn')+'">'+fmt(trp/tp*100,1)+'%</td></tr></tbody></table></div>';
el.innerHTML=h;renderMC(dd)}

function renderMC(dd){Object.keys(ch).forEach(function(k){if(k[0]==='m')ch[k].destroy()});var gc='#e8ede9',tc='#5a7265';
var x1=document.getElementById('mc1');if(x1)ch.mc1=new Chart(x1,{type:'bar',data:{labels:dd.map(function(d){return d.dia.slice(5)}),datasets:[
{label:'Moagem',data:dd.map(function(d){return d.mt}),backgroundColor:'rgba(0,132,61,.2)',borderColor:'#00843D',borderWidth:1,borderRadius:3,order:2},
{label:'Plano',data:dd.map(function(){return 2448.5}),type:'line',borderColor:'#e17055',borderWidth:2,borderDash:[6,3],pointRadius:0,order:1,fill:false}
]},options:{layout:{padding:{top:20}},responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:tc}}},scales:{x:{ticks:{color:tc,font:{size:8},maxRotation:45,autoSkip:true,maxTicksLimit:30},grid:{color:gc}},y:{ticks:{color:tc,callback:function(v){return fmt(v)}},grid:{color:gc}}}}});
var ms=MO.filter(function(m){return(D.m.meta_ipa[m]||0)>0||(D.m.real_u[m]||0)>0});
var x2=document.getElementById('mc2');if(x2)ch.mc2=new Chart(x2,{type:'bar',data:{labels:ms,datasets:[
{label:'Meta',data:ms.map(function(m){return D.m.meta_ipa[m]||0}),backgroundColor:'rgba(225,112,85,.25)',borderColor:'#e17055',borderWidth:1.5,borderRadius:4},
{label:'Real',data:ms.map(function(m){return D.m.real_u[m]||0}),backgroundColor:'rgba(0,132,61,.2)',borderColor:'#00843D',borderWidth:1.5,borderRadius:4}
]},options:{layout:{padding:{top:20}},responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:tc}}},scales:{x:{ticks:{color:tc},grid:{color:gc}},y:{ticks:{color:tc,callback:function(v){return(v/1000)+'k'}},grid:{color:gc}}}}});
var f1=FR[0];
var avgA=MO.map(function(m){var d=D.d.filter(function(r){return r.mes===m&&r['a'+f1]});if(!d.length)return null;var s=0;d.forEach(function(r){s+=r['a'+f1]});return s/d.length});
var x3=document.getElementById('mc3');if(x3)ch.mc3=new Chart(x3,{type:'line',data:{labels:MO,datasets:[{data:avgA,borderColor:'#00b894',backgroundColor:'rgba(0,184,148,.08)',fill:true,tension:.3,pointBackgroundColor:'#00b894',pointRadius:5,borderWidth:2.5}]},options:{layout:{padding:{top:20}},responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc},grid:{color:gc}},y:{ticks:{color:tc},grid:{color:gc}}}}});
var avgI=MO.map(function(m){var d=D.d.filter(function(r){return r.mes===m&&r['i'+f1]});if(!d.length)return null;var s=0;d.forEach(function(r){s+=r['i'+f1]});return s/d.length});
var x4=document.getElementById('mc4');if(x4)ch.mc4=new Chart(x4,{type:'bar',data:{labels:MO,datasets:[{data:avgI,backgroundColor:avgI.map(function(v){return v>8?'rgba(214,48,49,.3)':'rgba(0,132,61,.2)'}),borderColor:avgI.map(function(v){return v>8?'#d63031':'#00843D'}),borderWidth:1.5,borderRadius:4}]},options:{layout:{padding:{top:20}},responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc},grid:{color:gc}},y:{ticks:{color:tc},grid:{color:gc}}}}});
var avgMx=MO.map(function(m){var d=D.d.filter(function(r){return r.mes===m&&r.mix_p});if(!d.length)return null;var s=0;d.forEach(function(r){s+=r.mix_p});return s/d.length});
var avgR=MO.map(function(m){var d=D.d.filter(function(r){return r.mes===m&&r['k'+f1]});if(!d.length)return null;var s=0;d.forEach(function(r){s+=r['k'+f1]});return s/d.length});
var x5=document.getElementById('mc5');if(x5)ch.mc5=new Chart(x5,{type:'bar',data:{labels:MO,datasets:[
{label:'Mix%',data:avgMx,backgroundColor:'rgba(108,92,231,.2)',borderColor:'#6c5ce7',borderWidth:1.5,borderRadius:4,yAxisID:'y'},
{label:'Raio',data:avgR,type:'line',borderColor:'#e17055',pointBackgroundColor:'#e17055',pointRadius:4,borderWidth:2,yAxisID:'y1'}
]},options:{layout:{padding:{top:20}},responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:tc}}},scales:{x:{ticks:{color:tc},grid:{color:gc}},y:{position:'left',ticks:{color:tc},grid:{color:gc}},y1:{position:'right',ticks:{color:tc},grid:{display:false}}}}})}

function calcFr(dd){return FR.map(function(f){var rows=dd.filter(function(d){return d['r'+f]!=null});
var tR=0,wA=0,wI=0,wK=0,wD=0,tA=0,tI=0,tK=0,tD=0;
rows.forEach(function(d){tR+=d['r'+f]||0;if(d['a'+f]){wA+=d['a'+f]*d['r'+f];tA+=d['r'+f]}if(d['i'+f]){wI+=d['i'+f]*d['r'+f];tI+=d['r'+f]}
if(d['k'+f]){wK+=d['k'+f]*d['r'+f];tK+=d['r'+f]}if(d['d'+f]){wD+=d['d'+f]*d['r'+f];tD+=d['r'+f]}});
return{f:f,days:rows.length,real:tR,atr:tA>0?wA/tA:0,imp:tI>0?wI/tI:0,raio:tK>0?wK/tK:0,dc:tD>0?wD/tD:0,mix:0}})}
